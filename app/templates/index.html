<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-2xl">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">House Price Prediction</h1>

        <form id="predictionForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600">Overall Quality (1-10)</label>
                <input type="number" name="OverallQual" value="7" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600">Living Area (sqft)</label>
                <input type="number" name="GrLivArea" value="1500" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600">Basement Area (sqft)</label>
                <input type="number" name="TotalBsmtSF" value="1000" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600">Year Built</label>
                <input type="number" name="YearBuilt" value="2005" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600">Garage Cars</label>
                <input type="number" name="GarageCars" value="2" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600">Full Baths</label>
                <input type="number" name="FullBath" value="2" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600">Neighborhood</label>
                <select name="Neighborhood" class="w-full p-2 border rounded">
                    <option value="CollgCr">College Creek</option>
                    <option value="NoRidge">Northridge</option>
                    <option value="Edwards">Edwards</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600">Kitchen Quality</label>
                <select name="KitchenQual" class="w-full p-2 border rounded">
                    <option value="Ex">Excellent</option>
                    <option value="Gd" selected>Good</option>
                    <option value="TA">Average</option>
                </select>
            </div>
            <input type="hidden" name="ExterQual" value="Gd">
            <input type="hidden" name="BldgType" value="1Fam">

            <button type="submit" class="md:col-span-2 bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Predict Price</button>
        </form>

        <div id="result" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded">
            <p class="text-green-800 font-bold text-center text-xl" id="priceDisplay"></p>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
            });
            const data = await response.json();
            if(data.status === 'success') {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('priceDisplay').innerText = `Estimated Price: $${data.price.toLocaleString()}`;
            }
        };
    </script>
</body>
</html>
